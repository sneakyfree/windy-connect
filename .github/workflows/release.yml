name: Release to PyPI

# Publishes windy-connect to PyPI on tag push (e.g. v0.1.0).
#
# Uses PyPI Trusted Publishers (OIDC) — no PYPI_API_TOKEN secret required.
#
# One-time PyPI setup (see docs/pypi-setup.md):
#   PyPI → Account settings → Publishing → Add a pending publisher
#     owner:    sneakyfree
#     repo:     windy-connect
#     workflow: release.yml
#     env:      pypi
#
# To cut a release:
#   1. Bump `version` in pyproject.toml on main
#   2. git tag v<version> && git push origin v<version>
#   3. Watch this workflow in the Actions tab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest  # runner-lint-allow — CD/hosted-only; disabled, manual until CD mission
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest  # runner-lint-allow — CD/hosted-only; disabled, manual until CD mission
    environment: pypi
    permissions:
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v') || inputs.target == 'pypi'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          verbose: true

  publish-test:
    name: Publish to TestPyPI (manual dispatch only)
    needs: build
    runs-on: ubuntu-latest  # runner-lint-allow — CD/hosted-only; disabled, manual until CD mission
    environment: testpypi
    permissions:
      id-token: write
    if: inputs.target == 'testpypi'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          verbose: true
