name = "windy-connect-orchestrator"
main = "src/index.ts"
compatibility_date = "2026-05-01"
account_id = "193b347aedeaafe35de0b5a534b2d9aa"

# Embed the canonical SKILL.md from skills/windy-access/ at build time so the
# Worker can serve it at /.well-known/skills/windy-access/SKILL.md. This means
# Hermes auto-discovery works regardless of whether the source repo is
# public/private.
[[rules]]
type = "Text"
globs = ["**/*.md", "**/*.sh"]
fallthrough = true

# Device-code session store. Tried Workers KV first but none of the lockbox
# tokens have Workers KV scope (auth error 10000 against the KV API). Falling
# back to a Durable Object — code-defined, deploys without dashboard.
[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "DeviceSessions"

[[migrations]]
tag = "v1-sessions"
new_sqlite_classes = ["DeviceSessions"]

# Built-in Workers Observability — dashboard at dash.cloudflare.com under
# the Worker. Captures invocation traces, exceptions, head sample of logs.
# No external SaaS, no token rotation, free up to free-tier quota.
[observability]
enabled = true
head_sampling_rate = 1

# Note: rate limiting for /v1/device/init is implemented inside the
# DeviceSessions DO (sliding-window counter per IP), not via Cloudflare's
# Workers Rate Limiting beta — the [[unsafe.bindings]] route shows up as
# "Unsafe Metadata" but doesn't actually gate requests at runtime on this
# account. See sessions_do.ts:RATE_LIMIT_PATHS.

# Vars are public; secrets are set via `wrangler secret put`.
[vars]
ETERNITAS_API_URL = "https://api.eternitas.ai"
STALWART_ADMIN_URL = "https://mail.windymail.ai"
STALWART_ADMIN_USER = "admin"
ENABLE_REAL_PROVISIONING = "true"
ISSUER_NAME = "windy"
# ISSUER_URL = brand-facing identity (appears in bundle.issuer.url). Brand
# domain — may or may not be wired as a marketing site.
ISSUER_URL = "https://windyconnect.com"
# API_BASE_URL = Worker-served host. The CLI and OAuth callback resolve to
# this. Always live — it's where the Worker actually answers.
API_BASE_URL = "https://api.windyconnect.com"

# Secrets to set with `wrangler secret put <NAME>`:
#   STALWART_ADMIN_PASS         (from kit-army-config: <REDACTED-see-kit-army-config>)
#   GOOGLE_OAUTH_CLIENT_ID      (TODO: new GCP project "windy-connect-oauth")
#   GOOGLE_OAUTH_CLIENT_SECRET  (TODO)
#   SYNAPSE_ADMIN_TOKEN         (TODO: not yet in lockbox)
#   MIND_ADMIN_TOKEN            (TODO: Mind needs per-user key issuance endpoint)

# Custom domain api.windyconnect.com is attached via Cloudflare's Workers
# Custom Domains API (auto-creates DNS + SSL + service binding). Managed
# outside wrangler.toml because Custom Domains supersede [[routes]] for
# this Worker. See docs/dns-plan.md for the cert id + provisioning record.

[env.staging]
name = "windy-connect-orchestrator-staging"
[env.staging.vars]
ETERNITAS_API_URL = "https://api.eternitas.ai"
STALWART_ADMIN_URL = "https://mail.windymail.ai"
STALWART_ADMIN_USER = "admin"
ENABLE_REAL_PROVISIONING = "false"
ISSUER_NAME = "windy"
ISSUER_URL = "https://windyconnect.com"
API_BASE_URL = "https://api.windyconnect.com"
